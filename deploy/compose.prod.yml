# Portainer Git 스택용 — repo에서 빌드 후 배포 (push → webhook 재배포)
# Portainer Stack > Repository: compose path = deploy/compose.prod.yml
# 환경변수(OPENAI_API_KEY, ANNOUNCED_IP)는 Portainer 스택 env로 주입
services:
  exist-app:
    build:
      context: .. # repo 루트(Dockerfile 위치)
      dockerfile: Dockerfile
    image: exist-app:latest
    container_name: exist-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATA_DIR: /data
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANNOUNCED_IP: ${ANNOUNCED_IP}
      # 같은 공유기(LAN) 안 통화용 사설 IP — 헤어핀 NAT 회피. 맥미니 LAN IP.
      LOCAL_IP: ${LOCAL_IP:-192.168.0.82}
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "40100"
      # Colima는 UDP 포트포워딩을 못 함(lima는 TCP만). 미디어를 TCP로 우선 연결.
      MEDIA_PREFER_TCP: "1"
      # 코드 실행(/exec)은 격리된 runner 컨테이너로 위임. git push(/git)만 게이트.
      RUNNER_URL: http://runner:5000
      CODE_EXEC_ENABLED: ${CODE_EXEC_ENABLED:-0}
    ports:
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    volumes:
      - exist-data:/data
    networks:
      - sofie-portfolio_default
      - runner-net
    depends_on:
      - runner

  # 격리된 코드 실행 전용 컨테이너.
  # internal 네트워크(인터넷 차단) + 권한 제거 + read_only + 자원 제한.
  runner:
    build:
      context: ../runner
      dockerfile: Dockerfile
    image: exist-runner:latest
    container_name: exist-runner
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:exec,size=256m,mode=1777
    mem_limit: 512m
    cpus: "0.75"
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "65534:65534"
    networks:
      - runner-net

volumes:
  exist-data:
    name: exist-data # 고정 이름 — 수동/Portainer 배포 간 데이터 유지

networks:
  sofie-portfolio_default:
    external: true
  runner-net:
    internal: true # 외부 라우팅 없음(코드 실행 컨테이너 격리)
