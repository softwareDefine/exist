# 맥미니 배포용 — sofie-nginx와 같은 망(sofie-portfolio_default)에 붙어서
# nginx가 http://exist-app:4000 으로 프록시. OPENAI_API_KEY·ANNOUNCED_IP는 .env로.
services:
  exist-app:
    image: exist-app:latest
    container_name: exist-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATA_DIR: /data
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANNOUNCED_IP: ${ANNOUNCED_IP}
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "40100"
    ports:
      - "40000-40100:40000-40100/udp" # mediasoup 미디어 (4000은 nginx가 망 안에서 접근하므로 미공개)
    volumes:
      - exist-data:/data
    networks:
      - sofie-portfolio_default

volumes:
  # 외부 볼륨(접두사 없는 exist-data)에 실데이터가 있음. external 미지정 시
  # compose가 exist_exist-data를 새로 만들어 빈 DB로 떠버리므로 반드시 external.
  exist-data:
    external: true

networks:
  sofie-portfolio_default:
    external: true
