# 맥미니 배포용 — sofie-nginx와 같은 망(sofie-portfolio_default)에 붙어서
# nginx가 http://exist-app:4000 으로 프록시. OPENAI_API_KEY·ANNOUNCED_IP는 .env로.
services:
  exist-app:
    image: exist-app:latest
    container_name: exist-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATA_DIR: /data
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANNOUNCED_IP: ${ANNOUNCED_IP}
      # 같은 공유기(LAN) 안 통화용 사설 IP — 헤어핀 NAT 회피. 맥미니 LAN IP.
      LOCAL_IP: ${LOCAL_IP:-192.168.0.82}
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "40100"
      # Colima는 UDP 포트포워딩을 못 함(lima는 TCP만). 미디어를 TCP로 우선 연결.
      MEDIA_PREFER_TCP: "1"
    ports:
      # 4000은 nginx가 망 안에서 접근하므로 미공개. 미디어는 UDP+TCP 둘 다 publish
      # (Colima에선 UDP가 안 넘어와서 TCP가 실제 동작 경로)
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    volumes:
      - exist-data:/data
    networks:
      - sofie-portfolio_default

volumes:
  # 외부 볼륨(접두사 없는 exist-data)에 실데이터가 있음. external 미지정 시
  # compose가 exist_exist-data를 새로 만들어 빈 DB로 떠버리므로 반드시 external.
  exist-data:
    external: true

networks:
  sofie-portfolio_default:
    external: true
