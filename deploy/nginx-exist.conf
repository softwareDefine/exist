# /etc/nginx/sites-available/exist.sofie.co.kr  (또는 conf.d/)
# 1) 먼저 이 파일로 80 설정 → nginx -t && reload
# 2) sudo certbot --nginx -d exist.sofie.co.kr  (443 + 자동 리다이렉트 추가됨)
server {
    listen 80;
    server_name exist.sofie.co.kr;

    client_max_body_size 20m; # 썸네일/파일 업로드

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # WebSocket(Socket.IO / Yjs) 업그레이드 — 통화·실시간·공동편집에 필수
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s; # 긴 WS 연결 끊기지 않게
        proxy_send_timeout 3600s;
    }
}
