# exist — Portainer 스택용 compose
# OPENAI_API_KEY, ANNOUNCED_IP 는 Portainer 환경변수(또는 .env)로 주입
services:
  exist:
    build: .
    image: exist:latest
    container_name: exist
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATA_DIR: /data
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # mediasoup WebRTC — 맥미니 공인 IP (클라이언트가 미디어로 접속할 주소)
      ANNOUNCED_IP: ${ANNOUNCED_IP}
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "40100"
    ports:
      - "4000:4000" # 앱(HTTP/WS) — nginx가 이쪽으로 프록시
      - "40000-40100:40000-40100/udp" # mediasoup RTP/RTCP
    volumes:
      - exist-data:/data # DB·업로드·ydocs 영속

volumes:
  exist-data:
